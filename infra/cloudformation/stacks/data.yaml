AWSTemplateFormatVersion: '2010-09-09'
Description: HeatFX - recordings bucket + DynamoDB session index (greenfield)

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Name suffix for resources (e.g. dev, prod)

Resources:
  RecordingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'heatfx-${Environment}-recordings-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Suspended
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'heatfx-${Environment}-sessions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

Outputs:
  RecordingsBucketName:
    Description: S3 bucket for per-session recording JSON payloads
    Value: !Ref RecordingsBucket
    Export:
      Name: !Sub '${AWS::StackName}-RecordingsBucketName'

  RecordingsBucketArn:
    Description: ARN of recordings bucket
    Value: !GetAtt RecordingsBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RecordingsBucketArn'

  SessionsTableName:
    Description: DynamoDB table name for session metadata
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${AWS::StackName}-SessionsTableName'

  SessionsTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt SessionsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SessionsTableArn'
