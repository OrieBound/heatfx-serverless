AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HeatFX - HTTP API + Cognito JWT + Lambda (SAM nested stack)

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs20.x
    Architectures:
      - x86_64

Parameters:
  Environment:
    Type: String
    Default: dev
  UserPoolId:
    Type: String
  UserPoolClientId:
    Type: String
  SessionsTableName:
    Type: String
  RecordingsBucketName:
    Type: String
  CorsAllowOrigin:
    Type: String
    Default: '*'

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsAllowOrigin
        AllowHeaders:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        MaxAge: 600
      Auth:
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}'
              audience:
                - !Ref UserPoolClientId

  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'heatfx-${Environment}-api'
      Handler: src/index.handler
      CodeUri: ../api/
      Environment:
        Variables:
          SESSIONS_TABLE_NAME: !Ref SessionsTableName
          RECORDINGS_BUCKET_NAME: !Ref RecordingsBucketName
          CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
          USER_POOL_ID: !Ref UserPoolId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTableName
        - S3CrudPolicy:
            BucketName: !Ref RecordingsBucketName
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminRemoveUserFromGroup
                - cognito-idp:ListUsersInGroup
              Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
        ApiGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/{proxy+}
            Method: GET
            Auth:
              Authorizer: CognitoJwt
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/{proxy+}
            Method: POST
            Auth:
              Authorizer: CognitoJwt
        ApiDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/{proxy+}
            Method: DELETE
            Auth:
              Authorizer: CognitoJwt

Outputs:
  HttpApiUrl:
    Description: Invoke URL for the HTTP API
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/'
  HttpApiId:
    Value: !Ref HttpApi
