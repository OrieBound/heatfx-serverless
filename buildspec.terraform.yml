# CodePipeline → CodeBuild: Terraform apply (app stack) + Next.js static export + S3 sync + CloudFront invalidation.
# Does not use CloudFormation. Env vars are set on the CodeBuild project by infra/terraform/pipeline.

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Node $(node -v)"
      - |
        TF_VERSION="${TERRAFORM_VERSION:-1.9.8}"
        curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
        sudo unzip -o /tmp/terraform.zip -d /usr/local/bin
        sudo chmod +x /usr/local/bin/terraform
        terraform version

  pre_build:
    commands:
      - |
        if [ -z "${TF_STATE_BUCKET:-}" ] || [ -z "${TF_LOCK_TABLE:-}" ]; then
          echo "TF_STATE_BUCKET and TF_LOCK_TABLE must be set (from pipeline Terraform)."
          exit 1
        fi
      - |
        if [ -z "${TF_VAR_cognito_domain_prefix:-}" ]; then
          echo "TF_VAR_cognito_domain_prefix must be set on the CodeBuild project."
          exit 1
        fi
      - cd "$CODEBUILD_SRC_DIR/infra/terraform/api" && npm ci

  build:
    commands:
      - set -euo pipefail
      - cd "$CODEBUILD_SRC_DIR/infra/terraform"
      - |
        terraform init -input=false \
          -backend-config="bucket=${TF_STATE_BUCKET}" \
          -backend-config="key=${TF_STATE_KEY}" \
          -backend-config="region=${AWS_REGION}" \
          -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
          -backend-config="encrypt=true"
      - terraform apply -input=false -auto-approve
      - cd "$CODEBUILD_SRC_DIR"
      - npm ci
      - npm run build
      - SITE_BUCKET=$(cd infra/terraform && terraform output -raw site_bucket_name)
      - DIST_ID=$(cd infra/terraform && terraform output -raw cloudfront_distribution_id)
      - aws s3 sync out/ "s3://${SITE_BUCKET}/" --delete
      - aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
